version: "2"
sql:
  - engine: "postgresql"
    schema:
      - "db/baseline/schema.sql"
      - "db/migrations"
    queries:
      - "db/queries"
    gen:
      go:
        package: "sqlc"
        out: "internal/repository/postgres/sqlc"
        sql_package: "pgx/v5"
        emit_json_tags: false
        emit_pointers_for_null_types: true
        emit_interface: true
