{{define "content"}}
<h1 style="margin:0 0 16px;font-family:Arial,Helvetica,sans-serif;font-size:22px;line-height:1.35;color:#2F3E33;">{{.Title}}</h1>
<p style="margin:0 0 12px;font-family:Arial,Helvetica,sans-serif;font-size:15px;line-height:1.55;color:#4A4A44;">{{.Message}}</p>
{{if .Reason}}
<table role="presentation" cellpadding="0" cellspacing="0" border="0" style="margin:0 0 16px;width:100%;">
<tr><td style="background-color:#FFF1EB;border-radius:8px;padding:14px 18px;font-family:Arial,Helvetica,sans-serif;font-size:15px;line-height:1.5;color:#2F3E33;">
<strong>Причина:</strong> {{.Reason}}
</td></tr>
</table>
{{end}}
<p style="margin:0;font-family:Arial,Helvetica,sans-serif;font-size:15px;line-height:1.55;color:#4A4A44;">Откройте раздел «Мои отзывы» в приложении «ДомРядом», чтобы посмотреть подробности.</p>
{{end}}
