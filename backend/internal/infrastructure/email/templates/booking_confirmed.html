{{define "content"}}
<h1 style="margin:0 0 16px;font-family:Arial,Helvetica,sans-serif;font-size:20px;line-height:1.4;color:#1A0D1D;">Заявка подтверждена</h1>
<p style="margin:0 0 20px;font-family:Arial,Helvetica,sans-serif;font-size:15px;line-height:1.6;color:#1A0D1D;">Здравствуйте!<br>Владелец подтвердил вашу заявку на бронирование жилья по адресу <strong>{{.Address}}</strong>.</p>
{{if .Dates}}<table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="background-color:#F5F2F0;border-radius:8px;">
<tr><td style="padding:16px 20px;">
<p style="margin:0;font-family:Arial,Helvetica,sans-serif;font-size:14px;line-height:1.6;color:#1A0D1D;"><strong>Даты:</strong> {{.Dates}}</p>
</td></tr>
</table>{{end}}
<p style="margin:20px 0 0;font-family:Arial,Helvetica,sans-serif;font-size:15px;line-height:1.6;color:#1A0D1D;">Детали бронирования и контакты владельца доступны в приложении «ДомРядом». Приятного отдыха!</p>
{{end}}
