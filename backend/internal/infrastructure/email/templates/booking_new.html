{{define "content"}}
<h1 style="margin:0 0 16px;font-family:Arial,Helvetica,sans-serif;font-size:20px;line-height:1.4;color:#1A0D1D;">Новая заявка на бронирование</h1>
<p style="margin:0 0 20px;font-family:Arial,Helvetica,sans-serif;font-size:15px;line-height:1.6;color:#1A0D1D;">По вашему объявлению <strong>{{.Address}}</strong> поступила новая заявка.</p>
<table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="background-color:#F5F2F0;border-radius:8px;">
<tr><td style="padding:16px 20px;">
<p style="margin:0 0 8px;font-family:Arial,Helvetica,sans-serif;font-size:14px;line-height:1.6;color:#1A0D1D;"><strong>Гость:</strong> {{.GuestName}}</p>
<p style="margin:0 0 8px;font-family:Arial,Helvetica,sans-serif;font-size:14px;line-height:1.6;color:#1A0D1D;"><strong>Даты:</strong> {{.Dates}}</p>
<p style="margin:0;font-family:Arial,Helvetica,sans-serif;font-size:14px;line-height:1.6;color:#1A0D1D;"><strong>Гостей:</strong> {{.GuestsCount}}</p>
</td></tr>
</table>
<p style="margin:20px 0 0;font-family:Arial,Helvetica,sans-serif;font-size:15px;line-height:1.6;color:#1A0D1D;">Подтвердите или отклоните заявку в приложении «ДомРядом» — гость ждёт вашего ответа.</p>
{{end}}
