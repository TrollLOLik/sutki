{{define "content"}}
<h1 style="margin:0 0 16px;font-family:Arial,Helvetica,sans-serif;font-size:20px;line-height:1.4;color:#1A0D1D;">Заявка отклонена</h1>
<p style="margin:0 0 20px;font-family:Arial,Helvetica,sans-serif;font-size:15px;line-height:1.6;color:#1A0D1D;">Здравствуйте!<br>К сожалению, владелец отклонил вашу заявку на бронирование жилья по адресу <strong>{{.Address}}</strong>.</p>
{{if .Reason}}<table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="background-color:#F5F2F0;border-radius:8px;">
<tr><td style="padding:16px 20px;">
<p style="margin:0;font-family:Arial,Helvetica,sans-serif;font-size:14px;line-height:1.6;color:#1A0D1D;"><strong>Причина:</strong> {{.Reason}}</p>
</td></tr>
</table>{{end}}
<p style="margin:20px 0 0;font-family:Arial,Helvetica,sans-serif;font-size:15px;line-height:1.6;color:#1A0D1D;">В приложении «ДомРядом» вы можете подобрать другие варианты жилья на эти даты.</p>
{{end}}
