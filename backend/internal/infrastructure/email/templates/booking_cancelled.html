{{define "content"}}
<h1 style="margin:0 0 16px;font-family:Arial,Helvetica,sans-serif;font-size:20px;color:#2B2320;">Заявка отменена гостем</h1>
<p style="margin:0 0 12px;font-family:Arial,Helvetica,sans-serif;font-size:15px;line-height:1.5;color:#2B2320;">
{{.GuestName}} отменил(а) заявку на бронирование вашего объявления по адресу {{.Address}}.
</p>
{{if .Dates}}
<p style="margin:0 0 12px;font-family:Arial,Helvetica,sans-serif;font-size:15px;line-height:1.5;color:#2B2320;">
Даты: <strong>{{.Dates}}</strong>
</p>
{{end}}
<p style="margin:0;font-family:Arial,Helvetica,sans-serif;font-size:14px;line-height:1.5;color:#8A8078;">
Эти даты снова свободны для других гостей.
</p>
{{end}}
