{{define "content"}}
<h1 style="margin:0 0 16px;font-family:Arial,Helvetica,sans-serif;font-size:20px;line-height:1.4;color:#1A0D1D;">Код подтверждения</h1>
<p style="margin:0 0 24px;font-family:Arial,Helvetica,sans-serif;font-size:15px;line-height:1.6;color:#1A0D1D;">Ваш одноразовый код для входа в «ДомРядом»:</p>
<table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">
<tr>
<td align="center" style="background-color:#FFF1EA;border-radius:8px;padding:20px;">
<span style="font-family:'Courier New',Courier,monospace;font-size:32px;font-weight:bold;letter-spacing:8px;color:#FF5A1F;">{{.Code}}</span>
</td>
</tr>
</table>
<p style="margin:24px 0 0;font-family:Arial,Helvetica,sans-serif;font-size:13px;line-height:1.6;color:#8A8078;">Код действителен в течение {{.TTLMinutes}} минут. Если вы не запрашивали код, просто проигнорируйте это письмо — никому не сообщайте код.</p>
{{end}}
