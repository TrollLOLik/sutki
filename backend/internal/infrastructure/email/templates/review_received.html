{{define "content"}}
<h1 style="margin:0 0 16px;font-family:Arial,Helvetica,sans-serif;font-size:22px;line-height:1.35;color:#2F3E33;">Вы получили новый отзыв</h1>
<p style="margin:0 0 12px;font-family:Arial,Helvetica,sans-serif;font-size:15px;line-height:1.55;color:#4A4A44;">
Гость оставил отзыв о вашем объявлении{{if .Address}} по адресу <strong style="color:#2F3E33;">{{.Address}}</strong>{{end}}.
</p>
<table role="presentation" cellpadding="0" cellspacing="0" border="0" style="margin:0 0 16px;">
<tr><td style="background-color:#F4F1EC;border-radius:8px;padding:14px 18px;font-family:Arial,Helvetica,sans-serif;font-size:15px;line-height:1.5;color:#2F3E33;">
Оценка: <strong>{{.Rating}} из 5</strong>
</td></tr>
</table>
<p style="margin:0;font-family:Arial,Helvetica,sans-serif;font-size:15px;line-height:1.55;color:#4A4A44;">
Полный текст отзыва можно прочитать в приложении «ДомРядом» в разделе «Отзывы».
</p>
{{end}}
